<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kell</title>
    <link rel="stylesheet" href="clock.css">
    <script src="clock.js" defer></script>
</head>

<body>

<div id="container">

    <div id="clockContainer">
        <span id="hours">00:</span>
        <span id="minutes">00:</span>
        <span id="seconds">00</span>
    </div>

    <div id="dateContainer">
        <div id="weekday">Esmaspäev</div>
        <div>
            <span id="day">01.</span>
            <span id="month">01.</span>
            <span id="year">2000</span>
        </div>
    </div>

    <div id="buttons">
        <button id="bigger">+</button>
        <button id="smaller">-</button>
        <button id="colorChange">Värv</button>
        <button id="bgChange">Taust</button>
        <button id="fontChange">Font</button>
        <button id="reset">Reset</button>
    </div>

    <p id="author">Autor: Karel Reose</p>

    <p>
        <a href="https://github.com/kareelius/kodutoo-1" target="_blank">
            GitHub repo
        </a>
    </p>

</div>

</body>
</html>
